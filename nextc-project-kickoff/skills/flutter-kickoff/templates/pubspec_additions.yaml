# Dependency lists by tech choice.
#
# The scaffolder agent reads this file and runs `flutter pub add` for each group.
# Format: YAML lists keyed by decision field values.

# --- Always installed ---
always:
  - logger
  - flutter_secure_storage
  - connectivity_plus

always_dev:
  - very_good_analysis
  - flutter_launcher_icons
  - flutter_native_splash

# --- Routing ---
routing:
  go_router:
    - go_router
  auto_route:
    deps: [auto_route]
    dev_deps: [auto_route_generator, build_runner]

# --- State management ---
state_management:
  provider:
    - provider
  riverpod:
    deps: [flutter_riverpod, riverpod_annotation]
    dev_deps: [riverpod_generator, build_runner, custom_lint, riverpod_lint]
  bloc:
    deps: [flutter_bloc, equatable]
  riverpod_freezed:
    deps: [flutter_riverpod, riverpod_annotation, freezed_annotation, json_annotation]
    dev_deps: [riverpod_generator, freezed_generator, build_runner, json_serializable, custom_lint, riverpod_lint]

# --- Backend ---
backend:
  supabase:
    - supabase_flutter
  firebase:
    - firebase_core
  isar:  # WARNING: Isar 3.x is unmaintained (archived 2023). Consider Drift instead.
    deps: [isar, isar_flutter_libs]
    dev_deps: [isar_generator, build_runner]
  drift:
    deps: [drift, drift_flutter]
    dev_deps: [drift_dev, build_runner]

# --- L10n ---
l10n:
  deps: [intl]
  sdk_deps: [flutter_localizations]
